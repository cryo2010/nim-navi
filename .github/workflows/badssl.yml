name: badssl

on:
  schedule:
    - cron: "30 6 * * *"   # nightly (network-dependent, not a PR gate)
  workflow_dispatch:

jobs:
  badssl:
    runs-on: ubuntu-latest
    name: badssl TLS conformance
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Asserts navi rejects invalid server certificates (expired, self-signed,
      # wrong-host, untrusted-root) with verification on, and accepts a valid one.
      # Run directly (not via nimble) so a failing check fails the job.
      # KNOWN FAILING: navi does not currently verify certificate chains (only
      # the hostname), so the reject-invalid check fails. This job flags that gap
      # until it is fixed.
      - name: Run badssl TLS checks
        run: nim c -r --hints:off tests/interop/badssl.nim
