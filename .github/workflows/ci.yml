name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mm: [orc, arc]
    name: nimble test (--mm:${{ matrix.mm }})
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Only needed for the navi/chronos entry and its test.
      - name: Install chronos
        run: nimble install -y "chronos@>= 4.0.0"

      # Runtime libs for the br/zstd decompression tests (loaded via dynlib).
      - name: Install brotli/zstd
        run: sudo apt-get update && sudo apt-get install -y libbrotli1 libzstd1

      - name: Run tests
        run: nimble test
        env:
          NAVI_MM: ${{ matrix.mm }}

  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mm: [orc, arc]
    name: compile entries (--mm:${{ matrix.mm }}, -d:ssl)
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Only needed for the navi/chronos entry.
      - name: Install chronos
        run: nimble install -y "chronos@>= 4.0.0"

      # Compiles each backend entry with -d:ssl, exercising the OpenSSL/ALPN path
      # that the (plain-TCP) test suite never builds, under both memory managers.
      - name: Compile entry modules
        run: |
          for entry in navi navi/asyncdispatch navi/chronos; do
            echo "== $entry =="
            nim check --mm:${{ matrix.mm }} -d:ssl --path:src --hints:off "src/$entry.nim"
          done

  compile-js:
    runs-on: ubuntu-latest
    name: compile navi/js (nim js)
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # The js entry is guarded to the JavaScript backend, so it must be built
      # with `nim js`; this is the only CI job that compiles it.
      - name: Compile the JavaScript backend
        run: nim js --path:src --hints:off -o:navi_js.js src/navi/js.nim

  sanitize:
    runs-on: ubuntu-latest
    name: sanitizers (asan + ubsan)
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Only needed for the navi/chronos entry and its test.
      - name: Install chronos
        run: nimble install -y "chronos@>= 4.0.0"

      # Rebuilds and runs the whole suite under AddressSanitizer + UBSan
      # (NAVI_SANITIZE=1, see the nimble `test` task). Catches heap overflows,
      # use-after-free, and undefined behavior in the sans-io parsers and buffer
      # handling that a passing test would otherwise hide. Leak detection is off:
      # short-lived test processes leak by design (no teardown), and it is not
      # what this job is looking for.
      - name: Install brotli/zstd
        run: sudo apt-get update && sudo apt-get install -y libbrotli1 libzstd1

      - name: Run tests under ASan/UBSan
        run: nimble test
        env:
          NAVI_MM: orc
          NAVI_SANITIZE: "1"
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

  interop:
    runs-on: ubuntu-latest
    name: nghttpd interop (http/2)
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # nghttpd (the nghttp2 reference server) validates navi's HPACK encoder,
      # ALPN, real h2 framing, multiplexing, and receive-side flow control.
      - name: Install nghttpd
        run: sudo apt-get update && sudo apt-get install -y nghttp2-server

      - name: Run the interop suite
        run: nimble interop

  leak:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mm: [orc, arc]
    name: leak check (--mm:${{ matrix.mm }})
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.10"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Exercises every verb + request 100,000x (800k requests) against an
      # in-process keep-alive server and asserts the Nim heap stays flat. Run
      # under both managers: an orc/arc growth gap would mean a reference cycle.
      - name: Run the leak check
        run: nimble leak
        env:
          NAVI_MM: ${{ matrix.mm }}
